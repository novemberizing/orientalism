                                <h1 class="text-chinese">
                                    北㝠有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南㝠南㝠者天池也齊諧者志怪者也諧之言曰鵬之徙於南㝠也水擊三千里摶扶搖而上者九萬里去以六月息者也野馬也塵埃也生物之以息相吹也天之蒼蒼其正色耶其遠而無所至極耶其視下也亦若是則已矣
                                </h1>
